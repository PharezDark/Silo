version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: silo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=silo_dev
      - POSTGRES_USER=silo_admin
      - POSTGRES_PASSWORD=secure_silo_pass_2026
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: silo_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: