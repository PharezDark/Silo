{% load content_filters %}
<article class="bg-zinc-950 border border-zinc-900 rounded-xl p-5 space-y-4 hover:border-zinc-800 transition-colors duration-200">

    <div class="flex justify-between items-center text-xs font-mono">
        <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full {% if post.category == 'tech' %}bg-indigo-500{% elif post.category == 'art' %}bg-emerald-500{% else %}bg-zinc-500{% endif %}"></span>
            <span class="text-zinc-300 font-bold">@{{ post.author.username }}</span>
        </div>
        <span class="text-zinc-600 text-[11px]">{{ post.created_at|timesince }} ago</span>
    </div>

    <div class="text-zinc-300 text-sm tracking-normal leading-relaxed font-sans space-y-3 prose prose-invert">
        {{ post.content_markdown|render_markdown|safe }}
    </div>

    {% if post.canvas_image %}
        <div class="rounded-lg overflow-hidden border border-zinc-900 bg-zinc-900/20 max-h-[450px] flex items-center justify-center">
            <img src="{{ post.canvas_image.url }}" alt="Portfolio Submission Block" class="w-full h-full object-cover">
        </div>
    {% endif %}

    <div class="pt-3 border-t border-zinc-900/50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <form method="POST" action="#">
                {% csrf_token %}
                <button class="bg-zinc-900 hover:bg-zinc-850 text-zinc-400 hover:text-emerald-400 px-3 py-1.5 rounded-lg text-[11px] font-mono border border-zinc-800 transition-all flex items-center gap-1.5">
                    <span>⚡</span> Send $0.50 Tip
                </button>
            </form>
        </div>

        <span class="text-[10px] font-mono text-zinc-600 truncate max-w-[150px]" title="SHA-256 Verified Sign Block">
            SIG://{{ post.id|stringformat:"s"|slice:":8" }}
        </span>
    </div>
</article>
