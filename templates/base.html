<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Silo{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="h-full text-zinc-100 font-sans antialiased bg-zinc-950 selection:bg-indigo-500 selection:text-white">

    <div class="min-h-full max-w-[1250px] mx-auto grid grid-cols-1 md:grid-cols-4 lg:grid-cols-12 gap-0">

        <!-- Global Navigation Sidebar -->
        <aside class="md:col-span-1 lg:col-span-3 h-screen sticky top-0 px-4 py-6 border-r border-zinc-900 flex flex-col justify-between">
            <div class="space-y-6">
                <div class="flex items-center gap-2.5 px-2">
                    <div class="w-6 h-6 rounded-lg bg-indigo-600 flex items-center justify-center font-bold text-xs text-white tracking-tighter">S</div>
                    <span class="text-lg font-bold tracking-tight text-zinc-100">Silo</span>
                </div>

                <nav class="space-y-1">
                    <a href="{% url 'posts:timeline' %}" class="flex items-center gap-4 px-3 py-3 text-zinc-300 hover:text-white hover:bg-zinc-900/60 rounded-xl transition-all font-medium text-[15px]">
                        Home
                    </a>
                    <a href="{% url 'explore' %}" class="flex items-center gap-4 px-3 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/60 rounded-xl transition-all font-medium text-[15px]">
                        Explore
                    </a>
                    <a href="{% url 'chat' %}" class="flex items-center gap-4 px-3 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/60 rounded-xl transition-all font-medium text-[15px]">
                        Chat
                    </a>
                    <a href="{% url 'profile' %}" class="flex items-center gap-4 px-3 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900/60 rounded-xl transition-all font-medium text-[15px]">
                        Profile
                    </a>
                </nav>

                <div class="pt-2">
                    <a href="{% url 'posts:create_post' %}" class="block text-center bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-3 rounded-full transition-colors shadow-md">
                        Publish Post
                    </a>
                </div>
            </div>


            {% if request.user.is_authenticated and request.user.username %}
                <div class="p-3.5 bg-zinc-900/40 border border-zinc-850 rounded-2xl flex flex-col gap-2 text-xs">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span class="text-zinc-200 font-semibold truncate">@{{ request.user.username }}</span>
                    </div>
                    {% if request.user.public_key %}
                        <div class="text-zinc-500 space-y-1">
                            <span class="block text-[10px] text-zinc-400 uppercase tracking-wider font-semibold">User ID Key:</span>
                            <p class="font-mono text-[10px] truncate bg-zinc-950 p-2 rounded-lg border border-zinc-900 text-zinc-400">
                                {{ request.user.public_key }}
                            </p>
                        </div>
                    {% endif %}
                    <a href="{% url 'logout' %}" class="text-[11px] text-zinc-500 hover:text-red-400 font-medium transition-colors pt-1 border-t border-zinc-900">
                        Log out of account
                    </a>
                </div>
            {% endif %}
        </aside>

        <!-- View Content Render Target Space -->
        <main class="md:col-span-3 lg:col-span-9 grid grid-cols-1 lg:grid-cols-9 min-h-screen">
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <!-- Core Interactive Subsystem Control Handlers -->
    <script>
    // Asymmetric Follow State Engine
    function toggleFollow(username) {
        const url = `/users/${username}/follow/`;
        const btn = document.getElementById(`follow-btn-${username}`);
        const countElement = document.getElementById(`follower-count-${username}`);

        fetch(url, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                if (data.is_following) {
                    btn.innerText = 'Following';
                    btn.className = "w-full text-xs font-semibold py-2 rounded-xl transition-all border bg-zinc-950 border-zinc-800 text-zinc-400 hover:text-zinc-200";
                } else {
                    btn.innerText = 'Follow';
                    btn.className = "w-full text-xs font-semibold py-2 rounded-xl transition-all border bg-zinc-100 border-transparent text-zinc-950 hover:bg-zinc-200";
                }

                if (countElement) {
                    countElement.innerText = `${data.follower_count} follower${data.follower_count === 1 ? '' : 's'}`;
                }
            } else if (data.error) {
                alert(data.error);
            }
        })
        .catch(error => console.error('Error handling follow state execution:', error));
    }

    // Asymmetric Post-Like State Engine
    function toggleLike(postId) {
        // Matches the updated app root URL path routing scheme
        const url = `/posts/${postId}/like/`;
        const btn = document.getElementById(`like-btn-${postId}`);
        const countSpan = document.getElementById(`like-count-${postId}`);

        fetch(url, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Update counter value text display
                countSpan.innerText = data.like_count;

                // Adjust visual text accent states dynamically matching new card design
                if (data.is_liked) {
                    btn.classList.add('text-rose-500');
                    btn.classList.remove('text-zinc-500', 'hover:text-rose-400');
                } else {
                    btn.classList.remove('text-rose-500');
                    btn.classList.add('text-zinc-500', 'hover:text-rose-400');
                }
            } else if (data.error) {
                alert(data.error);
            }
        })
        .catch(error => console.error('Error executing asymmetric post-like execution state:', error));
    }
    </script>
</body>
</html>
