<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Silo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full text-zinc-100 font-sans antialiased bg-zinc-950 flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-zinc-900 border border-zinc-850 p-8 rounded-2xl space-y-6 shadow-xl">
        <!-- Logo Header -->
        <div class="text-center space-y-2">
            <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-lg text-white tracking-tighter mx-auto shadow-md">
                S
            </div>
            <h2 class="text-xl font-bold tracking-tight text-zinc-100 pt-2">Welcome back to Silo</h2>
            <p class="text-xs text-zinc-400">Sign in to access your dashboard feed and messages.</p>
        </div>

        <!-- Form Interface -->
        <form method="POST" action="." class="space-y-4">
            {% csrf_token %}

            {% if form.errors %}
                <div class="p-3 bg-red-950/40 border border-red-900 rounded-xl text-xs text-red-400 font-medium leading-relaxed">
                    Your username and password didn't match. Please try again.
                </div>
            {% endif %}

            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-zinc-400 tracking-wide uppercase">Username</label>
                <input type="text" name="username" required autofocus autocomplete="username"
                       class="w-full bg-zinc-950 border border-zinc-800 focus:border-indigo-500 text-sm rounded-xl px-4 py-3 text-zinc-200 placeholder:text-zinc-600 focus:outline-none transition-colors">
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold text-zinc-400 tracking-wide uppercase">Password</label>
                </div>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full bg-zinc-950 border border-zinc-800 focus:border-indigo-500 text-sm rounded-xl px-4 py-3 text-zinc-200 placeholder:text-zinc-600 focus:outline-none transition-colors">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-3 rounded-xl transition-colors shadow-md mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center pt-2 border-t border-zinc-850">
            <p class="text-xs text-zinc-500">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Register here</a>
            </p>
        </div>
    </div>

</body>
</html>
