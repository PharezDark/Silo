<div class="p-4 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-zinc-300 uppercase shrink-0">
            {{ target_user.username|slice:":2" }}
        </div>
        <div class="min-w-0">
            <p class="text-sm font-semibold text-zinc-200 truncate">@{{ target_user.username }}</p>
            <p class="text-xs text-zinc-500 mt-0.5" id="follower-count-{{ target_user.username }}">
                {{ target_user.followers.count }} follower{{ target_user.followers.count|pluralize }}
            </p>
        </div>
    </div>

    <div class="flex items-center gap-2 shrink-0">
        <a href="{% url 'chat:start_chat' target_user.username %}"
           class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-750 text-xs font-semibold rounded-lg text-zinc-200 transition-colors">
            Message
        </a>

        <button onclick="toggleFollow('{{ target_user.username }}')"
                id="follow-btn-{{ target_user.username }}"
                class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all border
                       {% if request.user in target_user.followers.all %}
                           bg-zinc-950 border-zinc-800 text-zinc-400 hover:text-zinc-200
                       {% else %}
                           bg-zinc-100 border-transparent text-zinc-950 hover:bg-zinc-200
                       {% endif %}">
            {% if request.user in target_user.followers.all %}
                Following
            {% else %}
                Follow
            {% endif %}
        </button>
    </div>
</div>
